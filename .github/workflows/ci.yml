# CI: run unit tests for backend, frontend, and scripts using each project's Docker test image.
# To run the same batch locally: see docs/CI_AND_TESTS.md

name: CI

on:
  pull_request:

jobs:
  backend:
    name: Backend - Java/Gradle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run unit tests (Docker test image)
        run: docker build -f backend/Dockerfile --target test ./backend

  frontend:
    name: Frontend - Node.js/React
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run unit tests (Docker test image)
        run: docker build -f frontend/Dockerfile --target test ./frontend

  scripts:
    name: Scripts - Python
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run unit tests (Docker test image)
        run: docker build -f scripts/Dockerfile --target test .
